<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Titixa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg"></div>

  <div class="desktop" id="desktop">

    <!-- ① ABOUT ME — top left -->
    <div class="el about-card" id="el-about" style="top:4vh; left:4vw; z-index:10; animation-delay:0s">
      <div class="about-ts">April 3, 2026 at 12:00 PM</div>
      <div class="about-label">About Me</div>
      <ul class="about-bullets">
        <li>Creative Designer with Tech background</li>
        <li>Can not stop coding for fun</li>
        <li>Believer of "look good, feel better"</li>
        <li>Exploring Europe in 20s</li>
      </ul>
    </div>

    <!-- ② PHOTO top-right — behind video -->
    <div class="el photo-frame photo-tr has-image" id="el-ptr" style="top:38vh; right:3vw; z-index:8; animation-delay:0.08s; background-image:url('img1.png')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span>pic 1</span>
    </div>

    <!-- ③ VIDEO WINDOW — center, tall -->
    <div class="el video-window" id="el-video" style="top:38vh; left:30vw; z-index:15; animation-delay:0.05s">
      <div class="titlebar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
        <span class="win-name">intro.MOV</span>
      </div>
      <div class="video-body">
        <video class="intro-video" autoplay muted loop playsinline preload="auto">
          <source src="intro.MOV" type="video/mp4">
          <source src="intro.MOV" type="video/quicktime">
        </video>
      </div>
    </div>

    <!-- ④ FOLDER: What I Do — left, mid -->
    <div class="el folder-item" id="el-f2" style="top:40vh; left:5vw; z-index:12; animation-delay:0.12s" data-folder="do">
      <svg class="folder-svg" viewBox="0 0 58 48" fill="none">
        <path d="M3 12C3 9.24 5.24 7 8 7H20.5C22.1 7 23.6 7.75 24.6 9L27 12H50C52.76 12 55 14.24 55 17V39C55 41.76 52.76 44 50 44H8C5.24 44 3 41.76 3 39V12Z" fill="url(#fd1)"/>
        <path d="M3 18C3 15.24 5.24 13 8 13H50C52.76 13 55 15.24 55 18V39C55 41.76 52.76 44 50 44H8C5.24 44 3 41.76 3 39V18Z" fill="url(#fd2)"/>
        <defs>
          <linearGradient id="fd1" x1="29" y1="7" x2="29" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#8cb6ec"/><stop offset="1" stop-color="#5e9ed6"/></linearGradient>
          <linearGradient id="fd2" x1="29" y1="13" x2="29" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#b2cef8"/><stop offset="1" stop-color="#76ace6"/></linearGradient>
        </defs>
      </svg>
      <span class="folder-label">What I Do</span>
    </div>

    <!-- ⑤ FOLDER: My Obsessions — left, below What I Do -->
    <div class="el folder-item" id="el-f3" style="top:58vh; left:10vw; z-index:12; animation-delay:0.16s" data-folder="obsessions">
      <svg class="folder-svg" viewBox="0 0 58 48" fill="none">
        <path d="M3 12C3 9.24 5.24 7 8 7H20.5C22.1 7 23.6 7.75 24.6 9L27 12H50C52.76 12 55 14.24 55 17V39C55 41.76 52.76 44 50 44H8C5.24 44 3 41.76 3 39V12Z" fill="url(#fo1)"/>
        <path d="M3 18C3 15.24 5.24 13 8 13H50C52.76 13 55 15.24 55 18V39C55 41.76 52.76 44 50 44H8C5.24 44 3 41.76 3 39V18Z" fill="url(#fo2)"/>
        <defs>
          <linearGradient id="fo1" x1="29" y1="7" x2="29" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#8cb6ec"/><stop offset="1" stop-color="#5e9ed6"/></linearGradient>
          <linearGradient id="fo2" x1="29" y1="13" x2="29" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#b2cef8"/><stop offset="1" stop-color="#76ace6"/></linearGradient>
        </defs>
      </svg>
      <span class="folder-label">My Obsessions</span>
    </div>

    <!-- ⑥ FOLDER: Where I Live — right, mid-low -->
    <div class="el folder-item" id="el-f1" style="top:62vh; right:5vw; z-index:12; animation-delay:0.20s" data-folder="live">
      <svg class="folder-svg" viewBox="0 0 58 48" fill="none">
        <path d="M3 12C3 9.24 5.24 7 8 7H20.5C22.1 7 23.6 7.75 24.6 9L27 12H50C52.76 12 55 14.24 55 17V39C55 41.76 52.76 44 50 44H8C5.24 44 3 41.76 3 39V12Z" fill="url(#fl1)"/>
        <path d="M3 18C3 15.24 5.24 13 8 13H50C52.76 13 55 15.24 55 18V39C55 41.76 52.76 44 50 44H8C5.24 44 3 41.76 3 39V18Z" fill="url(#fl2)"/>
        <defs>
          <linearGradient id="fl1" x1="29" y1="7" x2="29" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#8cb6ec"/><stop offset="1" stop-color="#5e9ed6"/></linearGradient>
          <linearGradient id="fl2" x1="29" y1="13" x2="29" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#b2cef8"/><stop offset="1" stop-color="#76ace6"/></linearGradient>
        </defs>
      </svg>
      <span class="folder-label">Where I Live</span>
    </div>

    <!-- ⑦ PHOTO bottom-left -->
    <div class="el photo-frame photo-bl has-image" id="el-pbl" style="top:68vh; left:2vw; z-index:9; animation-delay:0.22s; background-image:url('img2.png')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span>pic 2</span>
    </div>

    <!-- ⑧ PHOTO bottom-right -->
    <div class="el photo-frame photo-br has-image" id="el-pbr" style="top:74vh; right:3vw; z-index:9; animation-delay:0.24s; background-image:url('img3.png')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span>pic 3</span>
    </div>

  </div>

  <div class="drag-hint">hold & drag to rearrange</div>

  <!-- ══════ POPUP ══════ -->
  <div class="overlay" id="overlay">
    <div class="folder-popup" id="popup">
      <div class="popup-handle"></div>
      <div class="popup-close-row">
        <div class="popup-close" id="popupClose">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 1l8 8M9 1L1 9" stroke="rgba(0,0,0,0.38)" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="popup-heading-label" id="popupLabel"></div>
      <div class="popup-heading" id="popupTitle2"></div>
      <div class="popup-photos" id="popupPhotos"></div>
      <div class="popup-bubble" id="popupBubble"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
